# /etc/nginx/sites-available/pokemuu.com
# Habilitar: ln -s /etc/nginx/sites-available/pokemuu.com /etc/nginx/sites-enabled/

# ── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name pokemuu.com www.pokemuu.com;

    return 301 https://$host$request_uri;
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name pokemuu.com www.pokemuu.com;

    # Certificados Let's Encrypt (obtidos com: certbot --nginx -d pokemuu.com -d www.pokemuu.com)
    ssl_certificate     /etc/letsencrypt/live/pokemuu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pokemuu.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Segurança
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options  "nosniff"      always;
    add_header Referrer-Policy         "strict-origin" always;

    # ── Imagens dos cards — servidas diretamente pelo Nginx (não passam pelo container)
    location /cards/ {
        alias /var/www/pokemuu-cards/;
        expires    30d;
        add_header Cache-Control "public, immutable";
        add_header Vary          "Accept-Encoding";
        access_log off;
    }

    # ── Tudo o mais → container Docker na :3000 ──────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
